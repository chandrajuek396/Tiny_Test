<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heavy Performance Test Page</title>

<!-- ❌ Blocking multiple fonts -->
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100;300;400;700&family=Montserrat&family=Open+Sans&display=swap" rel="stylesheet">

<style>
/* ❌ Massive CSS */
body {
    font-family: 'Roboto', sans-serif;
    background: linear-gradient(45deg, #000, #111, #222);
    color: white;
    overflow-x: hidden;
}

/* ❌ Expensive animations */
@keyframes heavyAnimation {
    0% { transform: translateX(0px) rotate(0deg); }
    50% { transform: translateX(500px) rotate(180deg); }
    100% { transform: translateX(0px) rotate(360deg); }
}

.box {
    width: 200px;
    height: 200px;
    background: red;
    margin: 20px;
    animation: heavyAnimation 2s infinite linear;
}

/* ❌ Thousands of selectors */
.container div:nth-child(1) { color: red; }
.container div:nth-child(2) { color: blue; }
.container div:nth-child(3) { color: green; }
/* repeat pattern artificially */
.container div:nth-child(1000) { color: yellow; }

</style>

</head>
<body>

<h1>🚨 Heavy Performance Test Page</h1>

<div class="container" id="container"></div>

<!-- ❌ Huge base64 image (simulated heavy payload) -->
<img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAUA..." />

<script>

// ❌ BLOCKING JS (main thread freeze)
const start = Date.now();
while(Date.now() - start < 3000) {
    // freeze for 3 seconds
}

// ❌ Create massive DOM (1000+ elements)
const container = document.getElementById("container");
for (let i = 0; i < 2000; i++) {
    let div = document.createElement("div");
    div.className = "box";
    div.innerText = "Heavy Box " + i;
    container.appendChild(div);
}

// ❌ Layout thrashing (forces reflow repeatedly)
setInterval(() => {
    const elements = document.querySelectorAll('.box');
    elements.forEach(el => {
        el.style.width = (Math.random() * 300) + "px";
        el.offsetHeight; // force reflow
    });
}, 100);

// ❌ Memory leak
let leak = [];
setInterval(() => {
    leak.push(new Array(10000).fill("leak"));
}, 200);

// ❌ Scroll event heavy computation
window.addEventListener('scroll', () => {
    for (let i = 0; i < 1000000; i++) {}
});

// ❌ Multiple intervals
setInterval(() => console.log("Heavy Task 1"), 500);
setInterval(() => console.log("Heavy Task 2"), 700);
setInterval(() => console.log("Heavy Task 3"), 900);

// ❌ Large JSON processing
let bigData = [];
for (let i = 0; i < 50000; i++) {
    bigData.push({ index: i, value: Math.random() });
}
JSON.stringify(bigData);

</script>

</body>
</html>
