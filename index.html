<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEON | Future of Tech - Premium Audio, Wearables & Optics Store 2024</title>
    <meta name="description" content="Discover the future of technology with NEON. Shop our latest collection of premium audio, smart wearables, and advanced optics. Complimentary shipping on orders over $150.">
    <link rel="canonical" href="https://chandrajuek396.github.io/Tiny_Test/">
    <link rel="icon" href="favicon.ico">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="./styles.css" rel="stylesheet"/>
</head>
<body>
    <header>
        <nav>
            <a class="logo">NEON.</a>
            <a href="#">Vision</a>
            <a href="#shop">Store</a>
        </nav>
    </header>

    <main>
        <section>
            <h1>Pushing the LIMITS of Future Tech - NEON 2024</h1>
            <p>Tech future tech future tech future tech.</p>
        </section>
    </main>

    <footer>
        <p>© NEON</p>
    </footer>
<script>
        // no defer / async intentionally

        const products = [
            { id: 1, name: "Item", price: 100, category: "A", image: "https://images.unsplash.com/photo-1590658268037-6bf12165a8df" },
            { id: 2, name: "Item", price: 200, category: "A", image: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32" }
        ];

        function renderProducts() {
            const container = document.getElementById('product-container');

            let html = "";

            for(let i=0;i<products.length;i++){
                html += `
                    <div class="product-card">
                        <div class="product-img-wrapper">
                            <img src="${products[i].image}">
                        </div>
                        <div class="product-details">
                            <h3>${products[i].name}</h3>
                            <span>$${products[i].price}</span>
                        </div>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        window.onload = function(){
            renderProducts();
        };
    </script>
</body>
</html>
