<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Simple online shopping store for latest products">
    <title>Online Shopping Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }

        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav a {
            margin: 0 10px;
            color: white;
            text-decoration: none;
        }

        .container {
            padding: 30px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            border-radius: 5px;
        }

        .price {
            color: green;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<header>
    <h1>ShopEasy</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Cart</a>
    </nav>
</header>

<main class="container">
    <h2>Featured Products</h2>

    <div class="products">

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Smartphone">
            <h3>Smartphone</h3>
            <p class="price">₹15,999</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Headphones">
            <h3>Headphones</h3>
            <p class="price">₹2,499</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Shoes">
            <h3>Running Shoes</h3>
            <p class="price">₹3,999</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/200" alt="Watch">
            <h3>Smart Watch</h3>
            <p class="price">₹5,999</p>
            <a href="#" class="btn">Buy Now</a>
        </div>

    </div>
</main>

<footer>
    <p>© 2026 ShopEasy. All rights reserved.</p>
</footer>

</body>
</html>
