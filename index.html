<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Image Tool</title>

    <!-- ❌ Missing meta description (SEO hit) -->

    <!-- ❌ Blocking fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- ❌ Large CSS (render blocking) -->
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: #f4f4f4;
        }

        header {
            background: #111827;
            color: white;
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        .hero {
            height: 90vh;
            background: url('https://picsum.photos/1600/900') center/cover no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .hero h1 {
            font-size: 2.8rem;
        }

        .section {
            padding: 60px 10%;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
        }
    </style>

    <!-- ❌ Blocking JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>

</head>

<body>

<header>
    <h2>AI Tool</h2>
    <nav>
        <a href="#">Home</a>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
    </nav>
</header>

<section class="hero">
    <h1>Enhance Images with AI</h1>
</section>

<section class="section">
    <h2>Features</h2>

    <div class="grid">
        <div class="card">
            <!-- ❌ No lazy loading -->
            <img src="https://picsum.photos/500/300">
            <h3>Upscaling</h3>
            <p>Improve image quality instantly.</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/501/300">
            <h3>Batch Processing</h3>
            <p>Save time with bulk processing.</p>
        </div>

        <div class="card">
            <img src="https://picsum.photos/502/300">
            <h3>Noise Reduction</h3>
            <p>Cleaner and sharper visuals.</p>
        </div>
    </div>
</section>

<section class="section">
    <h2>Gallery</h2>

    <div class="grid">
        <!-- ❌ Multiple medium images -->
        <img src="https://picsum.photos/600/400">
        <img src="https://picsum.photos/601/400">
        <img src="https://picsum.photos/602/400">
    </div>
</section>

<footer style="background:#111; color:white; text-align:center; padding:20px;">
    <p>© 2026 AI Tool</p>
</footer>

<script>

// ❌ Moderate JS load (not extreme)
let data = [];
for(let i=0;i<20000;i++){
    data.push({value: Math.random()});
}

// ❌ Slight layout shift (CLS issue)
setTimeout(() => {
    let banner = document.createElement("div");
    banner.innerHTML = "<p style='background:#ef4444;color:white;padding:10px;text-align:center;'>Limited Offer!</p>";
    document.body.prepend(banner);
}, 1500);

// ❌ Inefficient scroll event (but not extreme)
window.addEventListener("scroll", () => {
    for(let i=0;i<2000;i++){}
});

</script>

</body>
</html>
