<!DOCTYPE html>
<html>
<head>
    <title>Vortex</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="container nav-content">
            <div class="logo">
                <div class="logo-icon"></div>
                <span>Vortex</span>
            </div>

            <div class="nav-links">
                <div class="nav-item">Click Here</div>
                <div class="nav-item">Go</div>
                <div class="nav-item">Stuff</div>
                <div class="btn">Join</div>
            </div>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">
        <div class="container center">
            <h1>
                The Future of Intelligence <br>
                <span class="gradient-text">is already here.</span>
            </h1>

            <p class="subtext">
                Revolutionize your workflow with the most advanced AI platform.
            </p>

            <div class="buttons">
                <div class="btn large">Get Started</div>
                <div class="btn-outline large">Learn More</div>
            </div>

            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f" alt="">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
